name: DART Disclosure Alert

on:
  schedule:
    - cron: '0 0 * * *'   # 09:00 KST
    - cron: '0 3 * * *'   # 12:00 KST
    - cron: '0 8 * * *'   # 17:00 KST
  workflow_dispatch:       # 수동 실행 가능
  push:
    paths:
      - '.trigger'         # 더미 파일 push로 즉시 실행

permissions:
  contents: write

concurrency:
  group: dart-alert
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run DART check
        run: python3 scripts/dart_alert.py

      - name: Commit & push
        run: |
          git config user.name  'Alert Bot'
          git config user.email 'alert@withusky.local'
          git add alerts.html alerts.json
          if git diff --cached --quiet; then
            echo 'No changes.'
          else
            NEW=$(python3 -c "import json; d=json.load(open('alerts.json')); print(d.get('last_new_count',0))")
            git commit -m "alert: $(TZ=Asia/Seoul date +%H:%M) - ${NEW}건 신규"
            git push
          fi
