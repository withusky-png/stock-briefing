<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐶 멍뭉이 DART 공시 알림</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --text: #e2e8f0; --muted: #94a3b8;
      --urgent: #ef4444; --warn: #f59e0b; --info: #3b82f6; --pup: #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Pretendard','Apple SD Gothic Neo',sans-serif; min-height: 100vh; }
    .hero { background: linear-gradient(135deg,#1e1b4b 0%,#1a1d27 100%); padding: 2.5rem 1.5rem 2rem; text-align: center; border-bottom: 1px solid var(--border); }
    .hero h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
    .hero .ts { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }
    .hero .dist { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .dist-item { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.4rem 1rem; font-size: 0.85rem; }
    .chip-nav { display: flex; gap: 0.5rem; padding: 1rem 1.5rem; overflow-x: auto; position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 10; }
    .chip { text-decoration: none; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 2rem; padding: 0.35rem 1rem; font-size: 0.85rem; white-space: nowrap; transition: all 0.2s; }
    .chip:hover { color: var(--text); border-color: var(--pup); }
    .main { max-width: 860px; margin: 0 auto; padding: 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1rem; }
    .card-urgent { border-left: 4px solid var(--urgent); }
    .card-warn   { border-left: 4px solid var(--warn); }
    .card-info   { border-left: 4px solid var(--info); }
    .card-empty  { border-left: 4px solid #4b5563; text-align: center; padding: 2rem; }
    .card-header { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .badge { border-radius: 0.3rem; padding: 0.2rem 0.5rem; font-size: 0.75rem; font-weight: 700; }
    .badge-urgent { background: #7f1d1d; color: #fca5a5; }
    .badge-warn   { background: #78350f; color: #fcd34d; }
    .badge-info   { background: #1e3a5f; color: #93c5fd; }
    .stock-name { font-weight: 700; } .stock-code { color: var(--muted); font-size: 0.85rem; }
    .received { margin-left: auto; color: var(--muted); font-size: 0.8rem; }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .card-title a { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
    .card-title a:hover { color: var(--pup); }
    .pup-note { color: var(--pup); font-size: 0.85rem; }
    .footer { text-align: center; color: var(--muted); font-size: 0.8rem; padding: 2rem 1.5rem; border-top: 1px solid var(--border); margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>🚨 멍뭉이가 물어온 공시 알림</h1>
    <div class="ts">2026-04-24 16:14 KST · 16:00 KST 장마감 후 점검</div>
    <div class="dist">
      <div class="dist-item">🚨 긴급 0건</div>
      <div class="dist-item">⚠️ 주의 0건</div>
      <div class="dist-item">ℹ️ 정보 0건</div>
      <div class="dist-item">📋 누적 0건</div>
    </div>
  </div>
  <nav class="chip-nav">
    <a class="chip" href="#all">전체</a>
    <a class="chip" href="#urgent">🚨 긴급</a>
    <a class="chip" href="#warn">⚠️ 주의</a>
    <a class="chip" href="#info">ℹ️ 정보</a>
  </nav>
  <main class="main" id="all">
    <div class="card card-empty">
      <div class="card-title">🐾 오늘은 공시를 못 찾았어요. 다음 점검에 또 올게요!</div>
      <div class="pup-note">WebSearch 검색 완료 — 어제·오늘 범위 내 구체적 DART 공시(rcpNo 확인 건) 없음</div>
    </div>
  </main>
  <footer class="footer">
    다음 점검: 오늘 익일 08:00 KST · 보유 5종목 (삼성전자·두산에너빌리티·태광·산일전기·GST) · 멍!🐾
  </footer>
</body>
</html>
