<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚨 멍뭉이 공시 알림</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #0f0f23; color: #e0e0e0; margin: 0; padding: 0; }
    .hero { background: linear-gradient(135deg, #1a1a3e 0%, #2d1b69 100%); padding: 2rem; text-align: center; border-bottom: 2px solid #7c3aed; }
    .hero h1 { font-size: 1.8rem; margin: 0 0 0.5rem; color: #fff; }
    .hero .ts { color: #a78bfa; font-size: 0.9rem; }
    .severity-dist { display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
    .dist-item { background: rgba(255,255,255,0.1); padding: 0.4rem 1rem; border-radius: 999px; font-size: 0.85rem; }
    .chip-nav { position: sticky; top: 0; z-index: 10; background: #1a1a2e; padding: 0.8rem 1rem; display: flex; gap: 0.6rem; overflow-x: auto; border-bottom: 1px solid #333; }
    .chip { padding: 0.35rem 1rem; border-radius: 999px; font-size: 0.82rem; text-decoration: none; border: 1px solid #444; color: #ccc; white-space: nowrap; }
    .chip:hover { background: #7c3aed; color: #fff; border-color: #7c3aed; }
    .cards { max-width: 900px; margin: 1.5rem auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .card { background: #1e1e3f; border-radius: 12px; padding: 1.2rem; border-left: 4px solid #555; }
    .card-urgent { border-left-color: #ef4444; }
    .card-warn { border-left-color: #f59e0b; }
    .card-info { border-left-color: #3b82f6; }
    .card-empty { border-left-color: #555; text-align: center; padding: 2rem; }
    .card-header { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .stock-name { font-weight: 700; color: #fff; }
    .stock-code { color: #888; font-size: 0.85rem; }
    .badge { padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.78rem; font-weight: 600; }
    .badge-urgent { background: #7f1d1d; color: #fca5a5; }
    .badge-warn { background: #78350f; color: #fcd34d; }
    .badge-info { background: #1e3a5f; color: #93c5fd; }
    .received { margin-left: auto; color: #888; font-size: 0.82rem; }
    .card-title { margin: 0.5rem 0; font-size: 1rem; }
    .card-title a { color: #93c5fd; text-decoration: none; }
    .card-title a:hover { text-decoration: underline; }
    .pup-note { margin-top: 0.6rem; color: #c4b5fd; font-size: 0.88rem; border-top: 1px solid #333; padding-top: 0.5rem; }
    .empty-state { color: #888; }
    .pup-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    footer { text-align: center; padding: 2rem; color: #555; font-size: 0.85rem; border-top: 1px solid #222; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>🚨 멍뭉이가 물어온 공시 알림</h1>
    <div class="ts">2026-04-27 08:11 KST</div>
    <div class="severity-dist">
      <span class="dist-item">🚨 긴급 0건</span>
      <span class="dist-item">⚠️ 주의 0건</span>
      <span class="dist-item">ℹ️ 정보 0건</span>
    </div>
  </div>

  <nav class="chip-nav">
    <a href="#urgent" class="chip">🚨 긴급 (0)</a>
    <a href="#warn" class="chip">⚠️ 주의 (0)</a>
    <a href="#info" class="chip">ℹ️ 정보 (0)</a>
    <a href="#all" class="chip">📋 전체 (0)</a>
  </nav>

  <div class="cards" id="all">
    <div class="card card-empty">
      <div class="empty-state">
        <div class="pup-icon">🐾</div>
        <p>오늘은 공시를 못 찾았어요. 다음 점검에 또 올게요!</p>
      </div>
    </div>
  </div>

  <footer>
    다음 점검: 오늘 15:00 KST &nbsp;|&nbsp;
    보유 종목: 삼성전자·두산에너빌리티·태광·산일전기·GST &nbsp;|&nbsp;
    🐾 멍뭉이 DART 봇
  </footer>
</body>
</html>
